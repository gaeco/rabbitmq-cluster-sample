server:
  port: 8080

spring:
  application:
    name: rabbitmq-cluster-sample
  rabbitmq:
    # Point at all three cluster nodes so the client fails over between them.
    addresses: localhost:5672,localhost:5673,localhost:5674
    username: guest
    password: guest

app:
  rabbitmq:
    exchange: sample.exchange
    queue: sample.queue
    routing-key: sample.key
