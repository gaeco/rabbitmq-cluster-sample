# Shared config for all three cluster nodes.
# Static ("classic config") peer discovery: every node knows the full member
# list up front and forms/joins the cluster automatically on boot.
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rabbit1
cluster_formation.classic_config.nodes.2 = rabbit@rabbit2
cluster_formation.classic_config.nodes.3 = rabbit@rabbit3

# Pause the minority side on a network partition so the cluster stays consistent.
cluster_partition_handling = pause_minority

# Allow the default guest user to log in through the published (non-loopback)
# ports. This is for LOCAL testing only — do not do this in production.
loopback_users = none

default_user = guest
default_pass = guest